name: publish-registry
# Fully CI/CD: builds the sample plugins against committed interop REFERENCE STUBS
# (no game install needed), stamps the registry (applying each manifest's
# minModSystemVersion + capPriorVersionsAt — see tools/set-version.py), and
# publishes plugins.json + DLLs to the public `stellar` MinIO bucket.
#
# build  : runs on every trigger (PRs too) — compile + validate, no approval.
# publish: gated on the Production environment (required reviewers = the
#          real-interop / in-game smoke), non-PR only. See docs/release-process.md.
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read          # untrusted plugin source is built here — least privilege, no secrets
    steps:
      - name: Checkout plugins
        uses: actions/checkout@v4

      - name: Checkout framework (Abstractions/PluginContracts source + interop stubs)
        uses: actions/checkout@v4
        with:
          repository: StellarProtocol/StellarResonanceModSystem
          ref: ${{ vars.FRAMEWORK_REF || 'main' }}
          path: framework

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Build every registry plugin FROM SOURCE and stage its DLL — manifest-driven, no
      # hardcoded list. Two source modes (the curated registry never ships an opaque binary):
      #   • pinned repo  — manifest has `repository`/`commit`/`projectPath`: clone that public
      #     repo at the commit and build it against the SDK from NuGet.org (no stubs needed).
      #   • in-repo sample — otherwise: build samples/<dll-without-ext> against the interop stubs.
      # A manifest whose declared `dll` no build produces is refused.
      - name: Build + stage each plugin from source
        shell: bash
        run: |
          FW="$GITHUB_WORKSPACE/framework"; REFS="$FW/refs"
          [ -d "$REFS" ] || { echo "::error::framework/refs stubs missing — run framework tools/gen-refs.sh and commit"; exit 1; }
          fail=0
          for m in plugins/*/manifest.json; do
            id="$(basename "$(dirname "$m")")"
            dll="$(python3 -c "import json;print(json.load(open('$m'))['dll'])")"
            repo="$(python3 -c "import json;print(json.load(open('$m')).get('repository',''))")"
            if [ -n "$repo" ]; then
              commit="$(python3 -c "import json;print(json.load(open('$m'))['commit'])")"
              path="$(python3 -c "import json;print(json.load(open('$m')).get('projectPath','.'))")"
              rm -rf "/tmp/src-$id" "/tmp/out-$id"; mkdir -p "/tmp/out-$id"
              git clone --quiet "$repo" "/tmp/src-$id"
              git -C "/tmp/src-$id" checkout --quiet "$commit"
              # SANDBOX: build untrusted external source in an isolated container — read-only source,
              # output-only mount, NO secrets and no access to the runner FS / other plugins /
              # GITHUB_TOKEN. dotnet build runs the repo's OWN build logic, so it must be confined.
              # (Network stays on for NuGet restore; there are no secrets to exfiltrate. Egress
              # filtering is a possible future hardening — see docs/.../dip17-migration.md.)
              docker run --rm \
                -v "/tmp/src-$id":/src:ro -v "/tmp/out-$id":/out -w /w \
                mcr.microsoft.com/dotnet/sdk:8.0 \
                bash -c "cp -a /src/. /w/ && dotnet build '$path' -c Release --nologo -o /out" \
                || { echo "::error file=$m::sandboxed build failed for '$id'"; fail=1; continue; }
              built="/tmp/out-$id/$dll"; [ -f "$built" ] || built=""
            else
              proj="${dll%.dll}"
              dotnet build "samples/$proj/$proj.csproj" -c Release --nologo \
                -p:StellarFrameworkSrc="$FW/src" -p:GameInterop="$REFS" -p:BepInExCore="$REFS"
              built="$(find "samples/$proj" -path "*/bin/Release/$dll" -type f 2>/dev/null | head -1)"
            fi
            if [ -z "$built" ]; then
              echo "::error file=$m::plugin '$id' declares dll '$dll' but no source build produced it (curated registry requires reviewable source — pinned repo or samples/). See CONTRIBUTING.md."
              fail=1; continue
            fi
            cp "$built" "plugins/$id/$dll"
          done
          [ "$fail" = 0 ] || exit 1

      - name: Validate registry (no publish)
        run: python tools/build-registry.py

      - name: Pass staged DLLs to publish job
        shell: bash
        run: tar czf staged-dlls.tgz plugins/*/Stellar.*.dll
      - uses: actions/upload-artifact@v4
        with:
          name: staged-dlls
          path: staged-dlls.tgz
          retention-days: 1

  publish:
    needs: build
    if: ${{ github.event_name != 'pull_request' }}
    runs-on: ubuntu-latest
    # Required reviewers on this environment = the real-interop / in-game gate.
    environment: Production
    steps:
      - name: Checkout plugins
        uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/download-artifact@v4
        with:
          name: staged-dlls
      - name: Restore staged DLLs
        shell: bash
        run: tar xzf staged-dlls.tgz       # -> plugins/<id>/Stellar.*.dll
      - name: Publish to MinIO
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_KEY }}
        run: python tools/build-registry.py --publish
