name: publish-registry
# Fully CI/CD: builds the sample plugins against committed interop REFERENCE STUBS
# (no game install needed), stamps the registry (applying each manifest's
# minModSystemVersion + capPriorVersionsAt — see tools/set-version.py), and
# publishes plugins.json + DLLs to the public `stellar` MinIO bucket.
#
# build  : runs on every trigger (PRs too) — compile + validate, no approval.
# publish: gated on the Production environment (required reviewers = the
#          real-interop / in-game smoke), non-PR only. See docs/release-process.md.
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read          # untrusted plugin source is built here — least privilege, no secrets
    steps:
      - name: Checkout plugins
        uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Build every registry build-target from its PINNED public repo and stage its DLL. A target is
      # one (plugin, channel) version — a plugin with a manifest.testing.json contributes TWO targets
      # (its stable + its testing build, distinct commits), so both channels are built. The registry
      # is manifests-only (no in-repo binaries): each external source is cloned at its commit and
      # built in an ISOLATED container (read-only source, output-only mount, no secrets / runner-FS
      # / GITHUB_TOKEN) so untrusted build logic is confined. SDK is restored from NuGet.org — no
      # framework checkout or interop stubs needed. A target without a pinned `repository` (or
      # whose build yields no `dll`) is refused. commit is authoritative; an optional `tag` is
      # verified to resolve to that commit (provenance) but is never built from on its own.
      - name: Build + stage each plugin from its pinned source (sandboxed)
        shell: bash
        run: |
          fail=0
          python tools/build-registry.py --targets > /tmp/targets.tsv
          while IFS=$'\t' read -r id channel repo commit tag path dll version staged; do
            tgt="$id[$channel] $version"
            [ "$repo" = "-" ] && repo=""        # "-" is the registry's empty-field sentinel
            [ "$commit" = "-" ] && commit=""
            [ "$tag" = "-" ] && tag=""
            if [ -z "$repo" ]; then
              echo "::error::$tgt has no pinned repository — the curated registry requires a public source repo (DIP17). See CONTRIBUTING.md."
              fail=1; continue
            fi
            work="/tmp/src-$id-$version"; out="/tmp/out-$id-$version"
            rm -rf "$work" "$out"; mkdir -p "$out"
            git clone --quiet "$repo" "$work"
            git -C "$work" checkout --quiet "$commit"
            if [ -n "$tag" ]; then
              tagsha="$(git -C "$work" rev-list -n1 "$tag" 2>/dev/null || true)"
              [ "$tagsha" = "$commit" ] || { echo "::error::$tgt tag '$tag' resolves to '$tagsha', not the pinned commit '$commit'"; fail=1; continue; }
            fi
            docker run --rm \
              -v "$work":/src:ro -v "$out":/out -w /w \
              mcr.microsoft.com/dotnet/sdk:8.0 \
              bash -c "cp -a /src/. /w/ && dotnet build '$path' -c Release --nologo -o /out" \
              || { echo "::error::sandboxed build failed for $tgt @ $commit"; fail=1; continue; }
            [ -f "$out/$dll" ] || { echo "::error::$tgt build produced no '$dll'"; fail=1; continue; }
            # Guard: a GetManifestResourceStream("X") with no matching <EmbeddedResource> compiles + runs
            # (returns null → silent placeholder icon). Fail the build instead of shipping an iconless DLL.
            python tools/check-embedded-resources.py "$work" "$out/$dll" \
              || { echo "::error::$tgt references an embedded resource it does not ship (see annotations)"; fail=1; continue; }
            cp "$out/$dll" "plugins/$id/$staged"   # version-suffixed so stable+testing don't collide
          done < /tmp/targets.tsv
          [ "$fail" = 0 ] || exit 1

      - name: Validate registry (no publish)
        run: python tools/build-registry.py

      - name: Pass staged DLLs to publish job
        shell: bash
        run: tar czf staged-dlls.tgz plugins/*/Stellar.*.dll
      - uses: actions/upload-artifact@v4
        with:
          name: staged-dlls
          path: staged-dlls.tgz
          retention-days: 1

  publish:
    needs: build
    if: ${{ github.event_name != 'pull_request' }}
    runs-on: ubuntu-latest
    # Required reviewers on this environment = the real-interop / in-game gate.
    environment: Production
    steps:
      - name: Checkout plugins
        uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/download-artifact@v4
        with:
          name: staged-dlls
      - name: Restore staged DLLs
        shell: bash
        run: tar xzf staged-dlls.tgz       # -> plugins/<id>/Stellar.*.dll
      - name: Publish to MinIO
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_KEY }}
        run: python tools/build-registry.py --publish
