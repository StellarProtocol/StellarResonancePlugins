name: publish-registry
# Fully CI/CD: builds the sample plugins against committed interop REFERENCE STUBS
# (no game install needed), stamps the registry (applying each manifest's
# minModSystemVersion + capPriorVersionsAt — see tools/set-version.py), and
# publishes plugins.json + DLLs to the public `stellar` MinIO bucket.
#
# build  : runs on every trigger (PRs too) — compile + validate, no approval.
# publish: gated on the Production environment (required reviewers = the
#          real-interop / in-game smoke), non-PR only. See docs/release-process.md.
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout plugins
        uses: actions/checkout@v4

      - name: Checkout framework (Abstractions/PluginContracts source + interop stubs)
        uses: actions/checkout@v4
        with:
          repository: StellarProtocol/StellarResonanceModSystem
          ref: ${{ vars.FRAMEWORK_REF || 'main' }}
          path: framework

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build plugins against interop stubs
        shell: bash
        run: |
          FW="$GITHUB_WORKSPACE/framework"
          REFS="$FW/refs"
          [ -d "$REFS" ] || { echo "::error::framework/refs stubs missing — run framework tools/gen-refs.sh and commit"; exit 1; }
          for proj in Stellar.ChatTools Stellar.CombatMeter Stellar.CooldownBar \
                      Stellar.EntityInspector Stellar.ModuleOptimizer Stellar.PlayerHUD \
                      Stellar.StatInspector; do
            dotnet build "samples/$proj/$proj.csproj" -c Release --nologo \
              -p:StellarFrameworkSrc="$FW/src" \
              -p:GameInterop="$REFS" -p:BepInExCore="$REFS"
          done

      - name: Stage built DLLs into registry dirs
        shell: bash
        run: |
          for proj in Stellar.ChatTools Stellar.CombatMeter Stellar.CooldownBar \
                      Stellar.EntityInspector Stellar.ModuleOptimizer Stellar.PlayerHUD \
                      Stellar.StatInspector; do
            id="$(echo "${proj#Stellar.}" | tr '[:upper:]' '[:lower:]')"
            cp "samples/$proj/bin/Release/$proj.dll" "plugins/$id/$proj.dll"
          done

      - name: Validate registry (no publish)
        run: python tools/build-registry.py

      - name: Pass staged DLLs to publish job
        shell: bash
        run: tar czf staged-dlls.tgz plugins/*/Stellar.*.dll
      - uses: actions/upload-artifact@v4
        with:
          name: staged-dlls
          path: staged-dlls.tgz
          retention-days: 1

  publish:
    needs: build
    if: ${{ github.event_name != 'pull_request' }}
    runs-on: ubuntu-latest
    # Required reviewers on this environment = the real-interop / in-game gate.
    environment: Production
    steps:
      - name: Checkout plugins
        uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/download-artifact@v4
        with:
          name: staged-dlls
      - name: Restore staged DLLs
        shell: bash
        run: tar xzf staged-dlls.tgz       # -> plugins/<id>/Stellar.*.dll
      - name: Publish to MinIO
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_KEY }}
        run: python tools/build-registry.py --publish
